    cooldown_seconds: 300
    match:
      protocol: TCP
      dst_port: 9042
    aggregate:
      unique_dst_ips:
        gte: 10
      within_seconds: 60
    alert:
      severity: High
      title: Cassandra Recon Activity
      description: Source contacted many Cassandra database services.
  - name: Database Service Sweep
    enabled: true
    event: packet
    cooldown_seconds: 300
    match:
      protocol: TCP
      dst_port:
        in:
          - 1433
          - 1521
          - 3306
          - 5432
          - 6379
          - 9042
          - 9200
          - 27017
    aggregate:
      unique_dst_ips:
        gte: 20
      count:
        gte: 40
      within_seconds: 120
    alert:
      severity: High
      title: Database Service Sweep
      description: Source contacted many database services across multiple hosts.
  - name: Database Port Enumeration
    enabled: true
    event: packet
    cooldown_seconds: 300
    match:
      protocol: TCP
      dst_port:
        in:
          - 1433
          - 1521
          - 3306
          - 5432
          - 6379
          - 9042
          - 9200
          - 27017
    aggregate:
      unique_dst_ports:
        gte: 5
      within_seconds: 120
    alert:
      severity: Medium
      title: Database Port Enumeration
      description: Source probed multiple database service types.
