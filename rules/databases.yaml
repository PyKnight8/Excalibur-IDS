signatures:
  - name: MySQL Recon
    enabled: true
    event: packet
    cooldown_seconds: 300
    match:
      protocol: TCP
      dst_port: 3306
    aggregate:
      unique_dst_ips:
        gte: 10
      within_seconds: 60
    alert:
      severity: High
      title: MySQL Recon Activity
      description: Source contacted many MySQL database services.
  - name: MSSQL Recon
    enabled: true
    event: packet
    cooldown_seconds: 300
    match:
      protocol: TCP
      dst_port: 1433
    aggregate:
